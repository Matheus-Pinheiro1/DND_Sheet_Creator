name: dnd_character_sheet
description: D&D 5e Character Sheet Manager
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  go_router: ^14.0.0
  dio: ^5.4.3+1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  flutter_animate: ^4.5.0
  percent_indicator: ^4.2.3
  uuid: ^4.4.0
  intl: ^0.19.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/icon.png
    - assets/data/items_index.json
    - assets/data/items_desc.json
    - assets/data/2024/classes.json
    - assets/data/2024/races.json
    - assets/data/2024/backgrounds.json
    - assets/data/2024/spells.json
    - assets/data/2024/ua_classes.json
    - assets/data/2024/class_equipment.json
    - assets/data/2024/armor.json
    - assets/data/2024/weapons.json
    - assets/data/2024/weapon_masteries.json
    - assets/data/2024/feats.json
    - assets/data/2024/metamagic_options.json
    - assets/data/2024/battle_master_maneuvers.json
    - assets/data/2024/eldritch_invocations.json
    - assets/data/2024/wild_magic_surges.json
    - assets/data/2024/monster_metadata.json
    - assets/data/2024/granted_spells.json
    - assets/data/2024/class_feature_details.json
    - assets/data/2024/class_features.json
    - assets/data/2024/subclasses.json
    - assets/data/2024/progression.json

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
